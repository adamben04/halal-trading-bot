name: Halal Trading Bot

on:
  schedule:
    - cron: '30 13 * * 1-5'  # 9:30 AM ET - market open
    - cron: '0 14 * * 1-5'   # 10:00 AM ET
    - cron: '30 14 * * 1-5'  # 10:30 AM ET
    - cron: '0 15 * * 1-5'   # 11:00 AM ET
    - cron: '30 15 * * 1-5'  # 11:30 AM ET
    - cron: '0 16 * * 1-5'   # 12:00 PM ET
    - cron: '30 16 * * 1-5'  # 12:30 PM ET
    - cron: '0 17 * * 1-5'   # 1:00 PM ET
    - cron: '30 17 * * 1-5'  # 1:30 PM ET
    - cron: '0 18 * * 1-5'   # 2:00 PM ET
    - cron: '30 18 * * 1-5'  # 2:30 PM ET
    - cron: '0 19 * * 1-5'   # 3:00 PM ET
    - cron: '30 19 * * 1-5'  # 3:30 PM ET
    - cron: '0 20 * * 1-5'   # 4:00 PM ET - market close
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        run: python main.py
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          PAPER_TRADING: true

      - name: Commit data
        run: |
          git config user.name "Bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: bot run $(date +%Y-%m-%d)"
          git push origin HEAD:master
